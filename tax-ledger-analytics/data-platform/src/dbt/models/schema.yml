version: 2

seeds:
  - name: partners_seed
    description: Warehouse-shaped partner rows (post-resolution grain for dbt demo).
    columns:
      - name: partner_id
        tests:
          - unique
          - not_null
  - name: hubs_seed
    columns:
      - name: hub_id
        tests:
          - unique
          - not_null
  - name: orders_seed
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: hub_id
        tests:
          - not_null
  - name: order_partner_seed
    columns:
      - name: order_id
        tests:
          - not_null
      - name: partner_id
        tests:
          - not_null

models:
  - name: partners
    description: Core partner dimension keyed by source partner_id.
    columns:
      - name: partner_id
        tests:
          - unique
          - not_null
  - name: hubs
    columns:
      - name: hub_id
        tests:
          - unique
          - not_null
  - name: orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: hub_id
        tests:
          - not_null
          - relationships:
              to: ref("hubs")
              field: hub_id
  - name: order_partner
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref("orders")
              field: order_id
      - name: partner_id
        tests:
          - not_null
          - relationships:
              to: ref("partners")
              field: partner_id
  - name: partner_metrics
    description: Golden-record partner performance metrics
    columns:
      - name: resolved_entity_id
        tests:
          - unique
          - not_null
      - name: orders_touched
        tests:
          - not_null
  - name: hub_aggregations
    description: Hub-level rollups for dashboards
    columns:
      - name: hub_id
        tests:
          - unique
          - not_null
